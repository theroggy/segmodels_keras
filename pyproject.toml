[tool.pyright]
exclude = ["local_ignore", "**/node_modules", "**/__pycache__", "**/.*"]
ignore = ["*"]

[tool.pytest.ini_options]
log_level = "DEBUG"
# Write all logging and warnings immediately while running test with debugger.
# log_cli = true
# addopts = "-p no:warnings"

[tool.ruff]
line-length = 88
target-version = "py310"
extend-exclude = ["docs/conf.py", "local_ignore/*", "examples"]

[tool.ruff.lint]
select = [
    "YTT",  # flake8-2020
    # "ANN",  # flake8-annotations
    "B",  # flake8-bugbear
    "A",  # flake8-builtins
    "C4",  # flake8-comprehensions
    "T10",  # flake8-debugger
    "ISC",  # flake8-implicit string concatenation
    # "G",  # flake8-logging-format
    "PIE",  # flake8-pie misc lints
    # "SIM",  # flake8-simplify
    "TC",  # flake8-type-checking imports
    "ARG",  # flake8-unused-arguments
    # "PTH",  # flake8-use-pathlib
    "FLY",  # flynt
    "I",  # isort
    "NPY",  # NumPy-specific rules
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    # "D",  # pydocstyle
    "F",  # pyflakes
    "PLC",  # pylint convention
    "PLE",  # pylint error
    "PLR",  # pylint refactor
    "PLW",  # pylint warning
    "UP",  # pyupgrade
    "RUF",  # Ruff-specific rules
]

ignore = [
    ### Intentionally disabled
    "E402",     # Module level import not at top of file
    "PLR0913",  # Too many arguments to function call
    "PLR0911",  # Too many returns
    "PLR0912",  # Too many branches
    "PLR0915",  # Too many statements
    "PLR2004",  # Magic number
    "PLR5501",  # Use `elif` instead of `else` then `if`, to reduce indentation
    "PLW2901",  # Loop variable overwritten by assignment target
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["ANN", "D"]
"perftests/*" = ["ANN", "D"]

[tool.ruff.lint.pydocstyle]
convention = "google"
